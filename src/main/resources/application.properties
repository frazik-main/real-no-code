spring.application.name=real-no-code
spring.config.import=optional:file:.env[.properties]
server.port=${SERVER_PORT:8080}

# H2 in-memory database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:realnocode;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA / Hibernate
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

# H2 web console (available at /h2-console)
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=${SPRING_H2_CONSOLE_PATH:/h2-console}

# AI provider settings
# valid values: copilot, gemini, local
ai.default-provider=${AI_DEFAULT_PROVIDER:copilot}
ai.timeout-seconds=${AI_TIMEOUT_SECONDS:300}

# Copilot CLI
ai.copilot.command=${AI_COPILOT_COMMAND:copilot}

# Gemini API
ai.gemini.base-url=${AI_GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
ai.gemini.model=${AI_GEMINI_MODEL:gemini-2.0-flash}
ai.gemini.api-key=${AI_GEMINI_API_KEY:}

# Local model on LM Studio (OpenAI-compatible endpoint)
ai.lm-studio.base-url=${AI_LM_STUDIO_BASE_URL:http://localhost:1234}
ai.lm-studio.model=${AI_LM_STUDIO_MODEL:local-model}
