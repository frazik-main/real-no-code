<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real No Code</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 2rem 1rem;
      color: #24292e;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      padding: 2rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 1.8rem;
      color: #0366d6;
    }
    p.subtitle {
      color: #586069;
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    textarea, input[type="text"], select {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1px solid #d1d5da;
      border-radius: 6px;
      font-size: 1rem;
      font-family: inherit;
      margin-bottom: 1rem;
      resize: vertical;
    }
    textarea:focus, input[type="text"]:focus, select:focus {
      outline: none;
      border-color: #0366d6;
      box-shadow: 0 0 0 3px rgba(3,102,214,0.15);
    }
    .field-group {
      border: 1px dashed #d1d5da;
      border-radius: 6px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .field-group p {
      margin: 0 0 0.8rem;
      font-size: 0.9rem;
      color: #586069;
    }
    .add-field-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .add-field-row input {
      flex: 1;
      margin-bottom: 0;
    }
    button {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .btn-primary {
      background: #0366d6;
      color: #fff;
      font-size: 1rem;
      padding: 0.65rem 1.5rem;
    }
    .btn-primary:hover { background: #0256b9; }
    .btn-secondary {
      background: #e1e4e8;
      color: #24292e;
    }
    .btn-secondary:hover { background: #d1d5da; }
    .nav { text-align: right; margin-bottom: 1rem; }
    .nav a {
      color: #0366d6;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .nav a:hover { text-decoration: underline; }
    .loading {
      display: none;
      margin-top: 1rem;
      color: #586069;
      font-style: italic;
    }
    #extra-fields { margin-top: 0.5rem; }
  </style>
</head>
<body>
<div class="container">
  <div class="nav"><a href="/history">📋 View History</a></div>
  <h1 id="modeTitle">🤖 Real No Code</h1>
  <p class="subtitle" id="modeSubtitle">
    Describe the page you want and AI will generate it for you.
    Add optional parameters to give it extra context.
  </p>

  <form id="generateForm" action="/generate" method="post">
    <input type="hidden" id="defaultProvider" th:value="${defaultProvider}" value="copilot">

    <label for="provider">AI Provider</label>
    <select id="provider" name="provider">
      <option value="copilot">Copilot CLI</option>
      <option value="gemini">Gemini</option>
      <option value="local">Local (LM Studio)</option>
    </select>

    <label for="prompt">What page do you want?</label>
    <textarea id="prompt" name="prompt" rows="4"
              placeholder="e.g. A contact form with fields for name, email and message. Modern design with a blue theme."></textarea>

    <div class="field-group">
      <p>Optional: add key-value parameters for extra context</p>
      <div id="extra-fields"></div>
      <button type="button" class="btn-secondary" onclick="addField()">+ Add parameter</button>
    </div>

    <button type="submit" class="btn-primary">✨ Generate</button>
  </form>

  <div class="loading" id="loading">⏳ Generating your page…</div>
</div>

<script>
  let fieldCount = 0;
  const path = window.location.pathname || '/';
  const isBusinessMode = path === '/business' || path.startsWith('/business/');
  const generateEndpoint = isBusinessMode ? '/business/generate' : '/generate';
  const defaultProvider = document.getElementById('defaultProvider').value || 'copilot';

  const providerSelect = document.getElementById('provider');
  if ([...providerSelect.options].some(o => o.value === defaultProvider)) {
    providerSelect.value = defaultProvider;
  }

  if (isBusinessMode) {
    document.title = 'Real No Code – Business Idea Mode';
    document.getElementById('modeTitle').textContent = '💡 Real No Code – Business Ideas';
    document.getElementById('modeSubtitle').textContent = 'Describe the business idea you want and AI will generate a concrete concept, market, pricing, risks, and action plan.';
    document.querySelector('label[for="prompt"]').textContent = 'What business idea should I generate?';
    document.getElementById('prompt').placeholder = 'e.g. A B2B SaaS idea for small clinics to reduce no-shows with automated reminders and monthly subscription pricing.';
    document.querySelector('.btn-primary').textContent = '✨ Generate Business Idea';
  }

  function addField() {
    fieldCount++;
    const container = document.getElementById('extra-fields');
    const row = document.createElement('div');
    row.className = 'add-field-row';
    row.innerHTML = `
      <input type="text" placeholder="Parameter name" name="fieldName_${fieldCount}" />
      <input type="text" placeholder="Value" name="fieldValue_${fieldCount}" />
      <button type="button" class="btn-secondary" onclick="this.parentElement.remove()">✕</button>
    `;
    container.appendChild(row);
  }

  function slugifyKebab(value) {
    return (value || '')
      .toLowerCase()
      .replace(/[^a-z0-9\s-]/g, ' ')
      .replace(/\s+/g, '-')
      .replace(/-+/g, '-')
      .replace(/^-+|-+$/g, '')
      .substring(0, 40);
  }

  document.getElementById('generateForm').addEventListener('submit', function (e) {
    e.preventDefault();
    const loading = document.getElementById('loading');
    loading.style.display = 'block';

    const data = new URLSearchParams();
    const prompt = document.getElementById('prompt').value;
    data.append('prompt', prompt);
    data.append('provider', providerSelect.value);
    if (isBusinessMode) {
      const baseSlug = slugifyKebab(prompt) || 'idea';
      const contextPath = path.startsWith('/business/') ? path : `/business/${baseSlug}`;
      data.append('contextPath', contextPath);
    }

    document.querySelectorAll('[name^="fieldName_"]').forEach(nameInput => {
      const idx = nameInput.name.split('_')[1];
      const valueInput = document.querySelector(`[name="fieldValue_${idx}"]`);
      const key = nameInput.value.trim();
      const val = valueInput ? valueInput.value.trim() : '';
      if (key) data.append(key, val);
    });

    fetch(generateEndpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: data.toString()
    })
    .then(res => res.text())
    .then(html => {
      document.open();
      document.write(html);
      document.close();
    })
    .catch(err => {
      loading.style.display = 'none';
      alert('Error: ' + err.message);
    });
  });
</script>
</body>
</html>
