<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generation History – Real No Code</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 2rem 1rem;
      color: #24292e;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      padding: 2rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 { margin-top: 0; color: #0366d6; }
    .nav { margin-bottom: 1rem; }
    .nav a { color: #0366d6; text-decoration: none; }
    .nav a:hover { text-decoration: underline; }
    .empty { color: #586069; font-style: italic; }
    .entry {
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .entry-meta {
      font-size: 0.8rem;
      color: #586069;
      margin-bottom: 0.4rem;
    }
    .entry-prompt {
      font-weight: 600;
      margin-bottom: 0.6rem;
    }
    .preview-frame {
      width: 100%;
      height: 300px;
      border: 1px solid #d1d5da;
      border-radius: 4px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="nav"><a href="/">← Back to Home</a></div>
  <h1>📋 Generation History</h1>

  <div th:if="${#lists.isEmpty(history)}" class="empty">
    No pages generated yet. <a href="/">Generate your first page</a>.
  </div>

  <div th:each="entry : ${history}" class="entry">
    <div class="entry-meta">
      <span th:text="${#temporals.format(entry.createdAt, 'yyyy-MM-dd HH:mm:ss')}">date</span>
      &nbsp;|&nbsp; ID: <span th:text="${entry.id}">0</span>
    </div>
    <div class="entry-prompt" th:text="${entry.prompt}">prompt</div>
    <iframe class="preview-frame"
            th:srcdoc="${entry.generatedHtml}"
            sandbox="allow-scripts"
            title="Preview"></iframe>
  </div>
</div>
</body>
</html>
